name: TypeScript SDK

on:
  push:
    paths:
      - "packages/sdk/**"
      - "packages/demo/**"
      - "packages/ble/**"
      - "packages/wifi/**"
      - ".github/workflows/sdk.yml"
  pull_request:
    paths:
      - "packages/sdk/**"
      - "packages/demo/**"
      - "packages/ble/**"
      - "packages/wifi/**"
      - ".github/workflows/sdk.yml"
  workflow_dispatch:

jobs:
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      demo: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.demo }}
      sdk: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.sdk }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            demo:
              - 'packages/demo/**'
            sdk:
              - 'packages/sdk/**'

  test-sdk:
    name: fernlink-sdk tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  check-demo:
    name: demo CLI type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/demo

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  check-wifi:
    name: WiFi/TCP transport type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Build SDK (peer dependency)
        working-directory: packages/sdk
        run: npm ci && npm run build

      - name: Install WiFi dependencies
        working-directory: packages/wifi
        run: npm ci

      - name: Type-check
        working-directory: packages/wifi
        run: npx tsc --noEmit

  publish-demo:
    name: Bump version and publish fernlink-demo
    runs-on: ubuntu-latest
    needs: [test-sdk, check-demo, changes]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.changes.outputs.demo == 'true'
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: packages/demo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Sync to latest main
        run: git pull origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          npm version patch -m "chore(demo): bump to %s [skip ci]"

      - name: Push version commit
        run: git push

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-sdk:
    name: Bump version and publish fernlink-sdk
    runs-on: ubuntu-latest
    needs: [test-sdk, check-demo, check-wifi, test-ble-simulator, changes]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.changes.outputs.sdk == 'true'
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Sync to latest main
        run: git pull origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          npm version patch -m "chore(sdk): bump to %s [skip ci]"

      - name: Push version commit
        run: git push

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  test-ble-simulator:
    name: BLE simulator tests + type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ble

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/ble/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run simulator tests
        run: npm test
